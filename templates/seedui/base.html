{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Seed Scope{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'seedui/styles.css' %}">
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div>
          <a href="/" class="brand">Seed Scope</a>
          <p class="tagline">Six-view registration and one-image identification for seeds.</p>
        </div>
        <nav class="site-nav">
          <a href="/">Dashboard</a>
          <a href="/register/">Register Seed</a>
          <a href="/identify/">Identify Seed</a>
        </nav>
      </header>

      <main class="content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
